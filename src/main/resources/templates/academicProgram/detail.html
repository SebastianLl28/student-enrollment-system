<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}" lang="es">
<head>
  <title th:text="${academicProgram.name}">Programa académico</title>
</head>
<body>
<div layout:fragment="content">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h3 mb-1" th:text="${academicProgram.name}">Ingeniería de Sistemas</h1>
      <p class="text-muted mb-0">Código: <span th:text="${academicProgram.code}">ING-SIS</span></p>
    </div>
    <div class="d-flex gap-2">
      <a th:href="@{/app/secure/academicProgram}" class="btn btn-outline-secondary">Volver</a>
      <a th:href="@{/app/secure/academicProgram/{id}/edit(id=${academicProgram.id})}" class="btn btn-primary">Editar</a>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-header">
      <h2 class="h5 mb-0">Información del programa</h2>
    </div>
    <div class="card-body">

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">ID</div>
        <div class="col-md-8" th:text="${academicProgram.id}">1</div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Código</div>
        <div class="col-md-8" th:text="${academicProgram.code}">ING-SIS</div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Nombre</div>
        <div class="col-md-8" th:text="${academicProgram.name}">Ingeniería de Sistemas</div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Descripción</div>
        <div class="col-md-8" th:text="${academicProgram.description}">—</div>
      </div>

      <hr>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Estado</div>
        <div class="col-md-8">
          <span class="badge"
                th:classappend="${academicProgram.active} ? ' bg-success' : ' bg-secondary'"
                th:text="${academicProgram.active} ? 'Activo' : 'Inactivo'">Activo</span>
        </div>
      </div>

      <div class="row mb-0">
        <div class="col-md-4 fw-semibold">Fecha de creación</div>
        <div class="col-md-8"
             th:text="${#temporals.format(academicProgram.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:30</div>
      </div>

    </div>
  </div>

</div>
</body>
</html>
