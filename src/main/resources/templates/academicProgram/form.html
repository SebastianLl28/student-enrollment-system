<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}" lang="es">
<head>
  <title th:text="${academicProgram.id == null} ? 'Nuevo programa' : 'Editar programa'">Formulario programa</title>
</head>
<body>
<div layout:fragment="content">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-0">
        <i class="bi bi-mortarboard me-2"></i>
        <span th:text="${academicProgram.id == null} ? 'Nuevo programa' : 'Editar programa'">Formulario programa</span>
      </h2>
      <small class="text-muted">Complete los datos del programa académico</small>
    </div>
    <a th:href="@{/app/secure/academicProgram}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form th:with="formAction=${academicProgram.id == null} ? '/app/secure/academicProgram' : '/app/secure/academicProgram/' + ${academicProgram.id}"
            th:action="@{${formAction}}"
            th:object="${academicProgram}"
            method="post">

        <div class="row g-3">
          <div class="col-md-6">
            <label for="code" class="form-label">Código</label>
            <input type="text" id="code" class="form-control" th:field="*{code}" placeholder="Ej: ING-SIS" required>
          </div>

          <div class="col-md-6">
            <label for="name" class="form-label">Nombre</label>
            <input type="text" id="name" class="form-control" th:field="*{name}" placeholder="Ej: Ingeniería de Sistemas" required>
          </div>

          <div class="col-12">
            <label for="description" class="form-label">Descripción</label>
            <textarea id="description" class="form-control" rows="3" th:field="*{description}"
                      placeholder="Descripción del programa"></textarea>
          </div>

          <div class="col-12">
            <div class="form-check form-switch">
              <input type="checkbox" id="active" class="form-check-input" role="switch" th:field="*{active}">
              <label for="active" class="form-check-label">Activo</label>
            </div>
          </div>
        </div>

        <hr class="my-4">

        <div class="d-flex justify-content-end gap-2">
          <a th:href="@{/app/secure/academicProgram}" class="btn btn-outline-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>
            <span th:text="${academicProgram.id == null} ? 'Guardar' : 'Actualizar'">Guardar</span>
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
</body>
</html>
