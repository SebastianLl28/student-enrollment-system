<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}" lang="es">
<head>
  <title>Programas académicos</title>
</head>
<body>
<div layout:fragment="content">

  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
    <div>
      <h2 class="mb-0"><i class="bi bi-mortarboard me-2"></i>Programas académicos</h2>
      <small class="text-muted">Listado de programas académicos registrados</small>
    </div>
    <a th:href="@{/app/secure/academicProgram/new}" class="btn btn-primary">
      <i class="bi bi-plus-circle me-1"></i>Nuevo programa
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-striped align-middle mb-0">
          <thead class="table-primary">
          <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Estado</th>
            <th class="text-center">Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="academicProgram : ${academicPrograms}">
            <td th:text="${academicProgram.code}">ING-SIS</td>
            <td th:text="${academicProgram.name}">Ingeniería de Sistemas</td>
            <td>
              <span class="badge"
                    th:classappend="${academicProgram.active} ? ' bg-success' : ' bg-secondary'"
                    th:text="${academicProgram.active} ? 'Activo' : 'Inactivo'">Activo</span>
            </td>
            <td class="text-center text-nowrap">
              <a th:href="@{/app/secure/academicProgram/{id}(id=${academicProgram.id})}"
                 class="btn btn-sm btn-outline-secondary me-1" title="Ver detalle">
                <i class="bi bi-eye"></i>
              </a>
              <a th:href="@{/app/secure/academicProgram/{id}/edit(id=${academicProgram.id})}"
                 class="btn btn-sm btn-outline-primary" title="Editar">
                <i class="bi bi-pencil"></i>
              </a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(academicPrograms)}">
            <td colspan="4" class="text-center text-muted py-4">No hay programas académicos registrados.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
</body>
</html>
