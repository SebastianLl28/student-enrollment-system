<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}" lang="es">
<head>
  <title>Programas académicos</title>
</head>
<body>
<div layout:fragment="content">

  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
    <div>
      <h2 class="mb-0"><i class="bi bi-mortarboard me-2"></i>Programas académicos</h2>
      <small class="text-muted">Listado de programas académicos registrados</small>
    </div>
    <a th:href="@{/app/secure/academicProgram/new}" class="btn btn-primary">
      <i class="bi bi-plus-circle me-1"></i>Nuevo programa
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-striped align-middle mb-0">
          <thead class="table-primary">
          <tr>
            <th class="d-none d-sm-table-cell">Código</th>
            <th>Nombre</th>
            <th class="d-none d-md-table-cell">Descripción</th>
            <th>Estado</th>
            <th class="text-center">Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="academicProgram : ${academicPrograms}">
            <td class="d-none d-sm-table-cell text-nowrap" th:text="${academicProgram.code}">ING-SIS</td>
            <td class="fw-semibold" th:text="${academicProgram.name}">Ingeniería de Sistemas</td>
            <td class="d-none d-md-table-cell text-muted small">
              <span class="d-inline-block text-truncate" style="max-width:260px"
                    th:text="${academicProgram.description}">Descripción</span>
            </td>
            <td>
              <span class="badge"
                    th:classappend="${academicProgram.active} ? 'bg-success' : 'bg-secondary'"
                    th:text="${academicProgram.active} ? 'Activo' : 'Inactivo'">Activo</span>
            </td>
            <td class="text-center text-nowrap">
              <a th:href="@{/app/secure/academicProgram/{id}(id=${academicProgram.id})}"
                 class="btn btn-sm btn-outline-secondary me-1" title="Ver detalle">
                <i class="bi bi-eye"></i>
              </a>
              <a th:href="@{/app/secure/academicProgram/{id}/edit(id=${academicProgram.id})}"
                 class="btn btn-sm btn-outline-primary me-1" title="Editar">
                <i class="bi bi-pencil"></i>
              </a>
              <form th:action="@{/app/secure/academicProgram/{id}/toggle-active(id=${academicProgram.id})}"
                    method="post" class="d-inline">
                <button type="submit" class="btn btn-sm"
                        th:classappend="${academicProgram.active} ? 'btn-outline-warning' : 'btn-outline-success'"
                        th:title="${academicProgram.active} ? 'Desactivar' : 'Activar'">
                  <i class="bi"
                     th:classappend="${academicProgram.active} ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                </button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(academicPrograms)}">
            <td colspan="5" class="text-center text-muted py-4">No hay programas académicos registrados.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card-footer bg-white border-top-0 pb-3">
      <div th:replace="~{fragments/pagination :: paginator(${page}, '/app/secure/academicProgram')}"></div>
    </div>
  </div>

</div>
</body>
</html>
