<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}" lang="es">
<head>
  <title>Periodos académicos</title>
</head>
<body>
<div layout:fragment="content">

  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
    <div>
      <h2 class="mb-0"><i class="bi bi-calendar-range me-2"></i>Periodos académicos</h2>
      <small class="text-muted">Listado de periodos académicos registrados</small>
    </div>
    <a th:href="@{/app/secure/academicPeriod/new}" class="btn btn-primary">
      <i class="bi bi-plus-circle me-1"></i>Nuevo periodo
    </a>
  </div>

  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-striped align-middle mb-0">
          <thead class="table-primary">
          <tr>
            <th>Nombre</th>
            <th class="d-none d-sm-table-cell">Inicio</th>
            <th class="d-none d-sm-table-cell">Fin</th>
            <th>Estado</th>
            <th class="text-center">Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="academicPeriod : ${academicPeriods}">
            <td class="fw-semibold" th:text="${academicPeriod.name}">2026-I</td>
            <td class="d-none d-sm-table-cell text-nowrap"
                th:text="${#temporals.format(academicPeriod.startDate, 'dd/MM/yyyy')}">01/01/2026</td>
            <td class="d-none d-sm-table-cell text-nowrap"
                th:text="${#temporals.format(academicPeriod.endDate, 'dd/MM/yyyy')}">31/07/2026</td>
            <td>
              <span class="badge"
                    th:classappend="${academicPeriod.active} ? 'bg-success' : 'bg-secondary'"
                    th:text="${academicPeriod.active} ? 'Activo' : 'Inactivo'">Activo</span>
            </td>
            <td class="text-center text-nowrap">
              <a th:href="@{/app/secure/academicPeriod/{id}(id=${academicPeriod.id})}"
                 class="btn btn-sm btn-outline-secondary me-1" title="Ver detalle">
                <i class="bi bi-eye"></i>
              </a>
              <a th:href="@{/app/secure/academicPeriod/{id}/edit(id=${academicPeriod.id})}"
                 class="btn btn-sm btn-outline-primary me-1" title="Editar">
                <i class="bi bi-pencil"></i>
              </a>
              <form th:action="@{/app/secure/academicPeriod/{id}/delete(id=${academicPeriod.id})}"
                    method="post" class="d-inline"
                    onsubmit="return confirm('¿Eliminar este periodo académico?')">
                <button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar">
                  <i class="bi bi-trash"></i>
                </button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(academicPeriods)}">
            <td colspan="5" class="text-center text-muted py-4">No hay periodos académicos registrados.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card-footer bg-white border-top-0 pb-3">
      <div th:replace="~{fragments/pagination :: paginator(${page}, '/app/secure/academicPeriod')}"></div>
    </div>
  </div>

</div>
</body>
</html>
