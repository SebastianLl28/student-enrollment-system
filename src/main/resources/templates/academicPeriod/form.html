<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}" lang="es">
<head>
  <title th:text="${academicPeriod.id == null} ? 'Nuevo periodo' : 'Editar periodo'">Formulario periodo</title>
</head>
<body>
<div layout:fragment="content">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-0">
        <i class="bi bi-calendar-range me-2"></i>
        <span th:text="${academicPeriod.id == null} ? 'Nuevo periodo' : 'Editar periodo'">Formulario periodo</span>
      </h2>
      <small class="text-muted">Complete los datos del periodo académico</small>
    </div>
    <a th:href="@{/app/secure/academicPeriod}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form th:with="formAction=${academicPeriod.id == null} ? '/app/secure/academicPeriod' : '/app/secure/academicPeriod/' + ${academicPeriod.id}"
            th:action="@{${formAction}}"
            th:object="${academicPeriod}"
            method="post">

        <div class="row g-3">
          <div class="col-12">
            <label for="name" class="form-label">Nombre</label>
            <input type="text" id="name" class="form-control"
                   th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   placeholder="Ej: 2026-I">
            <div class="invalid-feedback" th:errors="*{name}">Error</div>
          </div>

          <div class="col-md-6">
            <label for="startDate" class="form-label">Fecha de inicio</label>
            <input type="date" id="startDate" class="form-control" th:field="*{startDate}" required>
          </div>

          <div class="col-md-6">
            <label for="endDate" class="form-label">Fecha de fin</label>
            <input type="date" id="endDate" class="form-control" th:field="*{endDate}" required>
          </div>

          <div class="col-12">
            <div class="form-check form-switch">
              <input type="checkbox" id="active" class="form-check-input" role="switch" th:field="*{active}">
              <label for="active" class="form-check-label">Activo</label>
            </div>
          </div>
        </div>

        <hr class="my-4">

        <div class="d-flex justify-content-end gap-2">
          <a th:href="@{/app/secure/academicPeriod}" class="btn btn-outline-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>
            <span th:text="${academicPeriod.id == null} ? 'Guardar' : 'Actualizar'">Guardar</span>
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
</body>
</html>
