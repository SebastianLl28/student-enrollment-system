<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}" lang="es">
<head>
  <title>Nueva matrícula</title>
</head>
<body>
<div layout:fragment="content">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-0"><i class="bi bi-journal-plus me-2"></i>Nueva matrícula</h2>
      <small class="text-muted">Registre la matrícula de un estudiante en un programa y periodo</small>
    </div>
    <a th:href="@{/app/secure/enrollment}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
  </div>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}">Error</div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form th:action="@{/app/secure/enrollment}" method="post">

        <div class="row g-3">

          <div class="col-md-12">
            <label for="studentId" class="form-label">Estudiante</label>
            <select id="studentId" name="studentId" class="form-select" required>
              <option value="">Seleccione un estudiante</option>
              <option th:each="s : ${students}"
                      th:value="${s.id}"
                      th:text="|${s.fullName} (${s.code})|">Juan Pérez (2026-001)</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="academicProgramId" class="form-label">Programa académico</label>
            <select id="academicProgramId" name="academicProgramId" class="form-select" required>
              <option value="">Seleccione un programa</option>
              <option th:each="p : ${programs}" th:if="${p.active}"
                      th:value="${p.id}"
                      th:text="${p.name}">Ingeniería de Software</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="academicPeriodId" class="form-label">Periodo académico</label>
            <select id="academicPeriodId" name="academicPeriodId" class="form-select" required>
              <option value="">Seleccione un periodo</option>
              <option th:each="per : ${periods}" th:if="${per.active}"
                      th:value="${per.id}"
                      th:text="${per.name}">2026-I</option>
            </select>
          </div>

          <div class="col-12">
            <label for="observation" class="form-label">Observación <span class="text-muted">(opcional)</span></label>
            <textarea id="observation" name="observation" class="form-control" rows="3"
                      placeholder="Notas adicionales sobre la matrícula"></textarea>
          </div>

        </div>

        <div class="alert alert-info mt-4 mb-0 small">
          <i class="bi bi-info-circle me-1"></i>
          La matrícula se registrará como <strong>Pendiente de pago</strong> y se activará
          cuando se confirme el pago.
        </div>

        <hr class="my-4">

        <div class="d-flex justify-content-end gap-2">
          <a th:href="@{/app/secure/enrollment}" class="btn btn-outline-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>Registrar matrícula
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
</body>
</html>
