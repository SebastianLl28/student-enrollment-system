<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/app}" lang="es">
<head>
  <title>Matrículas</title>
</head>
<body>
<div layout:fragment="content">

  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
    <div>
      <h2 class="mb-0"><i class="bi bi-journal-text me-2"></i>Matrículas</h2>
      <small class="text-muted">Listado de matrículas registradas</small>
    </div>
    <a th:href="@{/app/secure/enrollment/new}" class="btn btn-primary"
       sec:authorize="hasRole('ADMIN')">
      <i class="bi bi-journal-plus me-1"></i>Nueva matrícula
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-striped align-middle mb-0">
          <thead class="table-primary">
          <tr>
            <th>Estudiante</th>
            <th class="d-none d-md-table-cell">Programa</th>
            <th class="d-none d-sm-table-cell">Periodo</th>
            <th class="d-none d-lg-table-cell">Fecha matrícula</th>
            <th>Estado</th>
            <th class="text-center">Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="enrollment : ${enrollments}">
            <td class="fw-semibold text-nowrap" th:text="${enrollment.student.fullName}">Juan Pérez</td>
            <td class="d-none d-md-table-cell" th:text="${enrollment.academicProgram.name}">Ingeniería de Software</td>
            <td class="d-none d-sm-table-cell text-nowrap" th:text="${enrollment.academicPeriod.name}">2026-I</td>
            <td class="d-none d-lg-table-cell text-nowrap"
                th:text="${#temporals.format(enrollment.enrollmentDate, 'dd/MM/yyyy')}">01/03/2026</td>
            <td th:switch="${enrollment.status.name()}">
              <span th:case="'PAID'" class="badge bg-success">Matriculado</span>
              <span th:case="'PENDING_PAYMENT'" class="badge bg-warning text-dark">Pend. pago</span>
              <span th:case="'CANCELLED'" class="badge bg-secondary">Cancelada</span>
            </td>
            <td class="text-center text-nowrap">
              <a th:href="@{/app/secure/enrollment/{id}(id=${enrollment.id})}"
                 class="btn btn-sm btn-outline-secondary me-1" title="Ver detalle">
                <i class="bi bi-eye"></i>
              </a>
              <form th:if="${enrollment.status.name() != 'CANCELLED'}"
                    th:action="@{/app/secure/enrollment/{id}/cancel(id=${enrollment.id})}"
                    method="post" class="d-inline"
                    sec:authorize="hasRole('ADMIN')"
                    onsubmit="return confirm('¿Cancelar esta matrícula? Esta acción no se puede deshacer.')">
                <button type="submit" class="btn btn-sm btn-outline-danger" title="Cancelar matrícula">
                  <i class="bi bi-x-circle"></i>
                </button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(enrollments)}">
            <td colspan="6" class="text-center text-muted py-4">No hay matrículas registradas.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card-footer bg-white border-top-0 pb-3">
      <div th:replace="~{fragments/pagination :: paginator(${page}, '/app/secure/enrollment')}"></div>
    </div>
  </div>

</div>
</body>
</html>
