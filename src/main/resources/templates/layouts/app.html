<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title layout:title-pattern="$CONTENT_TITLE | Panel Horizonte">Panel Horizonte</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-light">

<!-- Barra superior solo en móvil (para abrir el menú) -->
<nav class="navbar bg-dark navbar-dark d-md-none px-3">
  <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
    <span class="navbar-toggler-icon"></span>
  </button>
  <span class="navbar-brand mb-0 fw-bold">Instituto Horizonte</span>
</nav>

<div class="d-flex">

  <!-- ============ SIDEBAR ============ -->
  <div class="offcanvas-md offcanvas-start bg-dark text-white" id="sidebar"
       tabindex="-1" style="width: 260px;">
    <div class="offcanvas-header border-bottom border-secondary">
      <h5 class="offcanvas-title fw-bold">Instituto Horizonte</h5>
      <button class="btn-close btn-close-white d-md-none" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body d-flex flex-column p-3" style="min-height: 100vh;">
      <p class="text-secondary text-uppercase small mb-2 px-3">Módulos</p>
      <ul class="nav nav-pills flex-column gap-1">
        <li class="nav-item">
          <a th:href="@{/app/secure/home}"
             class="nav-link text-white d-flex align-items-center gap-2"
             th:classappend="${activeMenu == 'home'} ? 'active' : ''">
            <i class="bi bi-house"></i> Inicio
          </a>
        </li>
        <li class="nav-item">
          <a th:href="@{/app/secure/student}"
             class="nav-link text-white d-flex align-items-center gap-2"
             th:classappend="${activeMenu == 'students'} ? 'active' : ''">
            <i class="bi bi-people"></i> Estudiantes
          </a>
        </li>
        <li class="nav-item">
          <a th:href="@{/app/secure/academicPeriod}"
             class="nav-link text-white d-flex align-items-center gap-2"
             th:classappend="${activeMenu == 'periods'} ? 'active' : ''">
            <i class="bi bi-calendar-range"></i> Periodos
          </a>
        </li>
        <li class="nav-item">
          <a th:href="@{/app/secure/academicProgram}"
             class="nav-link text-white d-flex align-items-center gap-2"
             th:classappend="${activeMenu == 'programs'} ? 'active' : ''">
            <i class="bi bi-mortarboard"></i> Programas
          </a>
        </li>
        <li class="nav-item">
          <a th:href="@{/app/secure/payments}"
             class="nav-link text-white d-flex align-items-center gap-2"
             th:classappend="${activeMenu == 'payments'} ? 'active' : ''">
            <i class="bi bi-credit-card"></i> Pagos
          </a>
        </li>
      </ul>

      <!-- Usuario + cerrar sesión, pegado abajo -->
      <div class="mt-auto">
        <hr class="border-secondary">
        <div class="px-3 mb-2 small">
          <i class="bi bi-person-circle"></i>
          <span sec:authentication="name">Usuario</span>
        </div>
        <form th:action="@{/logout}" method="post">
          <button type="submit" class="btn btn-outline-light w-100 d-flex align-items-center justify-content-center gap-2">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- ============ CONTENIDO ============ -->
  <main class="flex-grow-1 p-4" style="min-height: 100vh;">
    <div layout:fragment="content">
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
