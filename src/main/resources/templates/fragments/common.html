<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title}">Instituto Horizonte</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>

<body>


<header th:fragment="header">
  <div class="bg-dark text-light py-2 small">
    <div class="container d-flex flex-wrap justify-content-between gap-2">
      <span>Admisiones 2026 abiertas | Becas por excelencia</span>
      <div class="d-flex gap-3">
        <a class="nav-link active" th:href="@{/programas}"><i class="bi bi-mortarboard"></i> Programas</a>
        <a class="nav-link active" th:href="@{/pagos}"><i class="bi bi-credit-card"></i> Pagos</a>
      </div>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" th:href="@{/}">Instituto Horizonte</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
              aria-controls="mainNav" aria-expanded="false" aria-label="Mostrar navegación">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto me-lg-3">
          <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/programas}">Carreras</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/pagos}">Pagos</a></li>
        </ul>
        <a class="btn btn-primary" th:href="@{/login}">Iniciar sesión</a>
      </div>
    </div>
  </nav>
</header>


<footer th:fragment="footer" class="py-5 border-top bg-white">
  <div class="container">
    <p class="mb-0 text-secondary small">© 2026 Instituto Horizonte. Todos los derechos reservados.</p>
  </div>
</footer>


<th:block th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</body>
</html>
