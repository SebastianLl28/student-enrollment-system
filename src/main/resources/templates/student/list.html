<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
  <title>Estudiantes</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>

<main>

  <div class="container my-4">

    <div
        class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
      <div>
        <h2 class="mb-0">
          <i class="bi bi-people me-2"></i>Estudiantes
        </h2>
        <small class="text-muted">Listado de estudiantes registrados</small>
      </div>

      <a th:href="@{/studentLocalModel/new}" class="btn btn-primary">
        <i class="bi bi-person-plus me-1"></i>Nuevo estudiante
      </a>
    </div>


    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover table-striped align-middle mb-0">
            <thead class="table-primary">
            <tr>
              <th>Código</th>
              <th>Nombre completo</th>
              <th>Documento</th>
              <th>Email</th>
              <th>Teléfono</th>
              <th>Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="studentLocalModel : ${students}">
              <td th:text="${studentLocalModel.code}">2026-001</td>

              <td class="text-nowrap" th:text="${studentLocalModel.fullName}">
                Juan Pérez
              </td>

              <td class="text-nowrap">
                <span class="text-muted small" th:text="${studentLocalModel.documentType}">DNI</span>
                <span th:text="${studentLocalModel.documentNumber}">12345678</span>
              </td>

              <td>
            <span class="d-inline-block text-truncate"
                  style="max-width: 200px;"
                  th:text="${studentLocalModel.email}">
              juan@email.com
            </span>
              </td>

              <td class="text-nowrap" th:text="${studentLocalModel.phone}">
                987654321
              </td>

              <td>
            <span class="badge"
                  th:classappend="${studentLocalModel.status.name() == 'ACTIVE'} ? ' bg-success' : ' bg-secondary'"
                  th:text="${studentLocalModel.status}">
              ACTIVE
            </span>
              </td>

              <td class="text-center text-nowrap">
                <a th:href="@{/studentLocalModel/{id}(id=${studentLocalModel.id})}"
                   class="btn btn-sm btn-outline-secondary me-1"
                   title="Ver detalle">
                  <i class="bi bi-eye"></i>
                </a>

                <a th:href="@{/studentLocalModel/{id}/edit(id=${studentLocalModel.id})}"
                   class="btn btn-sm btn-outline-primary"
                   title="Editar">
                  <i class="bi bi-pencil"></i>
                </a>
              </td>
            </tr>

            <tr th:if="${#lists.isEmpty(students)}">
              <td colspan="7" class="text-center text-muted py-4">
                No hay estudiantes registrados.
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
