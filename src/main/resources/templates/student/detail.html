<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}" lang="es">
<head>
  <title th:text="${student.fullName}">Estudiante</title>
</head>
<body>
<div layout:fragment="content">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h3 mb-1" th:text="${student.fullName}">Juan Pérez</h1>
      <p class="text-muted mb-0">Código: <span th:text="${student.code}">2026-001</span></p>
    </div>
    <div class="d-flex gap-2">
      <a th:href="@{/app/secure/student}" class="btn btn-outline-secondary">Volver</a>
      <a th:href="@{/app/secure/student/{id}/edit(id=${student.id})}" class="btn btn-primary">Editar</a>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-header">
      <h2 class="h5 mb-0">Información del estudiante</h2>
    </div>
    <div class="card-body">

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">ID</div>
        <div class="col-md-8" th:text="${student.id}">1</div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Código</div>
        <div class="col-md-8" th:text="${student.code}">2026-001</div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Nombres</div>
        <div class="col-md-8" th:text="${student.firstName}">Juan</div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Apellidos</div>
        <div class="col-md-8" th:text="${student.lastName}">Pérez</div>
      </div>

      <hr>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Tipo de documento</div>
        <div class="col-md-8" th:text="${student.documentType}">DNI</div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Número de documento</div>
        <div class="col-md-8" th:text="${student.documentNumber}">12345678</div>
      </div>

      <hr>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Email</div>
        <div class="col-md-8">
          <a th:href="|mailto:${student.email}|" th:text="${student.email}">estudiante@email.com</a>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Teléfono</div>
        <div class="col-md-8">
          <a th:href="|tel:${student.phone}|" th:text="${student.phone}">999999999</a>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Dirección</div>
        <div class="col-md-8" th:text="${student.address}">Av. Principal 123</div>
      </div>

      <hr>

      <div class="row mb-3">
        <div class="col-md-4 fw-semibold">Estado</div>
        <div class="col-md-8">
          <span class="badge"
                th:classappend="${student.status.name() == 'ACTIVE'} ? ' bg-success' : ' bg-secondary'"
                th:text="${student.status}">ACTIVE</span>
        </div>
      </div>

      <div class="row mb-0">
        <div class="col-md-4 fw-semibold">Fecha de creación</div>
        <div class="col-md-8"
             th:text="${#temporals.format(student.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:30</div>
      </div>

    </div>
  </div>

</div>
</body>
</html>
