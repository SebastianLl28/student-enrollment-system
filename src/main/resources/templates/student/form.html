<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
  <title th:text="${studentLocalModel.id == null} ? 'Nuevo estudiante' : 'Editar estudiante'">
    Formulario estudiante
  </title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>

<main>

  <div class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="mb-0">
          <i class="bi bi-person-lines-fill me-2"></i>
          <span th:text="${studentLocalModel.id == null} ? 'Nuevo estudiante' : 'Editar estudiante'">
            Formulario estudiante
          </span>
        </h2>
        <small class="text-muted">
          Complete los datos del estudiante
        </small>
      </div>

      <a th:href="@{/studentLocalModel}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Volver
      </a>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">

        <form th:with="formAction=${studentLocalModel.id == null} ? '/studentLocalModel' : '/studentLocalModel/' + ${studentLocalModel.id}"
              th:action="@{${formAction}}"
              th:object="${studentLocalModel}"
              method="post">

          <div class="row g-3">

            <div class="col-md-6">
              <label for="code" class="form-label">Código</label>
              <input type="text"
                     id="code"
                     class="form-control"
                     th:field="*{code}"
                     placeholder="Ej: 2026-001"
                     required>
            </div>

            <div class="col-md-6">
              <label for="status" class="form-label">Estado</label>
              <select id="status"
                      class="form-select"
                      th:field="*{status}"
                      required>
                <option value="">Seleccione un estado</option>
                <option th:each="status : ${studentStatuses}"
                        th:value="${status}"
                        th:text="${status}">
                  ACTIVE
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="firstName" class="form-label">Nombres</label>
              <input type="text"
                     id="firstName"
                     class="form-control"
                     th:field="*{firstName}"
                     placeholder="Ej: Juan"
                     required>
            </div>

            <div class="col-md-6">
              <label for="lastName" class="form-label">Apellidos</label>
              <input type="text"
                     id="lastName"
                     class="form-control"
                     th:field="*{lastName}"
                     placeholder="Ej: Pérez"
                     required>
            </div>

            <div class="col-md-6">
              <label for="documentType" class="form-label">Tipo de documento</label>
              <select id="documentType"
                      class="form-select"
                      th:field="*{documentType}"
                      required>
                <option value="">Seleccione un tipo</option>
                <option th:each="type : ${documentTypes}"
                        th:value="${type}"
                        th:text="${type}">
                  DNI
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="documentNumber" class="form-label">Número de documento</label>
              <input type="text"
                     id="documentNumber"
                     class="form-control"
                     th:field="*{documentNumber}"
                     placeholder="Ej: 12345678"
                     required>
            </div>

            <div class="col-md-6">
              <label for="email" class="form-label">Email</label>
              <input type="email"
                     id="email"
                     class="form-control"
                     th:field="*{email}"
                     placeholder="Ej: estudiante@email.com"
                     required>
            </div>

            <div class="col-md-6">
              <label for="phone" class="form-label">Teléfono</label>
              <input type="text"
                     id="phone"
                     class="form-control"
                     th:field="*{phone}"
                     placeholder="Ej: 987654321">
            </div>

            <div class="col-12">
              <label for="address" class="form-label">Dirección</label>
              <input type="text"
                     id="address"
                     class="form-control"
                     th:field="*{address}"
                     placeholder="Ej: Av. Principal 123">
            </div>

          </div>

          <hr class="my-4">

          <div class="d-flex justify-content-end gap-2">
            <a th:href="@{/studentLocalModel}" class="btn btn-outline-secondary">
              Cancelar
            </a>

            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save me-1"></i>
              <span th:text="${studentLocalModel.id == null} ? 'Guardar' : 'Actualizar'">
                Guardar
              </span>
            </button>
          </div>

        </form>

      </div>
    </div>

  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
