<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}" lang="es">
<head>
  <title>Iniciar sesión</title>
</head>
<body>
<div layout:fragment="content">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-5 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-4 text-center">Iniciar sesión</h1>

          <div th:if="${param.error}" class="alert alert-danger py-2">Email o contraseña incorrectos.</div>
          <div th:if="${param.logout}" class="alert alert-success py-2">Sesión cerrada correctamente.</div>

          <form th:action="@{/login}" method="post">
            <div class="mb-3">
              <label for="username" class="form-label">Email</label>
              <input type="email" id="username" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
          </form>

          <p class="text-center mt-3 mb-0">¿No tienes cuenta? <a th:href="@{/register}">Regístrate</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
