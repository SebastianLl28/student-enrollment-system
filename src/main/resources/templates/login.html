<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}" lang="es">
<head>
  <title>Iniciar sesión</title>
  <style>
    .input-icon { position: relative; }
    .input-icon .bi {
      position: absolute;
      top: 50%;
      left: .85rem;
      transform: translateY(-50%);
      color: #94a3b8;
      pointer-events: none;
    }
    .input-icon .form-control { padding-left: 2.5rem; }
    .seed-card {
      background: #f0f9ff;
      border: 1px dashed #93c5fd;
      border-radius: .75rem;
    }
    .seed-card code {
      background: #dbeafe;
      padding: .15rem .4rem;
      border-radius: .25rem;
      font-size: .8rem;
      color: #1d4ed8;
    }
  </style>
</head>
<body>
<div layout:fragment="content">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-9 col-md-6 col-lg-4">

      <!-- Card login -->
      <div class="card shadow-sm border-0 mb-3">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3 bg-primary bg-opacity-10"
                 style="width:56px;height:56px">
              <i class="bi bi-person-lock fs-4 text-primary"></i>
            </div>
            <h1 class="h5 fw-bold mb-0">Iniciar sesión</h1>
            <p class="text-muted small mb-0">Panel de administración</p>
          </div>

          <div th:if="${param.error}" class="alert alert-danger py-2 d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
            <span>Correo o contraseña incorrectos.</span>
          </div>
          <div th:if="${param.logout}" class="alert alert-success py-2 d-flex align-items-center gap-2">
            <i class="bi bi-check-circle-fill flex-shrink-0"></i>
            <span>Sesión cerrada correctamente.</span>
          </div>

          <form th:action="@{/login}" method="post">
            <div class="mb-3">
              <label for="username" class="form-label small fw-medium">Correo electrónico</label>
              <div class="input-icon">
                <i class="bi bi-envelope"></i>
                <input type="email" id="username" name="username" class="form-control"
                       placeholder="correo@horizonte.edu.pe" required autofocus>
              </div>
            </div>
            <div class="mb-4">
              <label for="password" class="form-label small fw-medium">Contraseña</label>
              <div class="input-icon">
                <i class="bi bi-lock"></i>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="••••••••" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
          </form>
        </div>
      </div>

      <!-- Usuario de prueba -->
      <div class="seed-card p-3">
        <p class="fw-semibold mb-2 small" style="color:#1d4ed8">
          <i class="bi bi-info-circle me-1"></i>Usuario de prueba
        </p>
        <div class="d-flex justify-content-between align-items-center gap-3">
          <div>
            <span class="badge bg-info text-dark mb-1">Secretaría</span>
            <div class="small"><code>secretaria@horizonte.edu.pe</code></div>
            <div class="small text-muted">Contraseña: <code>sec123</code></div>
          </div>
          <span class="text-muted small text-end">Solo lectura</span>
        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
