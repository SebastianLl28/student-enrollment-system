<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}" lang="es">
<head><title>Pago recibido</title></head>
<body>
<div layout:fragment="content">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card border-0 shadow text-center">
        <div class="card-body py-5 px-4">

          <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-4"
               style="width:88px;height:88px;background:rgba(34,197,94,.1)">
            <i class="bi bi-check-circle-fill text-success" style="font-size:2.8rem"></i>
          </div>

          <h2 class="fw-bold mb-2">¡Pago recibido!</h2>
          <p class="text-muted mb-4">
            Tu pago fue procesado correctamente por PayPal.<br>
            En unos instantes tu matrícula quedará activa.
          </p>

          <div class="alert alert-success text-start py-2 px-3 mb-0" style="font-size:.875rem">
            <i class="bi bi-envelope-check me-1"></i>
            Recibirás un correo de confirmación con el resumen de tu matrícula.
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
