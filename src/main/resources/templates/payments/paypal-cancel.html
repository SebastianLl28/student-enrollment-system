<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}" lang="es">
<head><title>Pago no completado</title></head>
<body>
<div layout:fragment="content">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card border-0 shadow text-center">
        <div class="card-body py-5 px-4">

          <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-4"
               style="width:88px;height:88px;background:rgba(234,179,8,.1)">
            <i class="bi bi-x-circle-fill text-warning" style="font-size:2.8rem"></i>
          </div>

          <h2 class="fw-bold mb-2">Pago no completado</h2>
          <p class="text-muted mb-4">
            Cancelaste el proceso de pago en PayPal.<br>
            Tu matrícula sigue <strong>pendiente de pago</strong>.
          </p>

          <div class="alert alert-warning text-start py-2 px-3 mb-0" style="font-size:.875rem">
            <i class="bi bi-envelope me-1"></i>
            El enlace de pago fue enviado a tu correo. Úsalo en cualquier momento para completar el pago.
            Si tienes dudas, comunícate con secretaría.
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
