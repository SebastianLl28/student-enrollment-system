<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}" lang="es">
<head>
  <title>Registro de estudiante</title>
</head>
<body>
<div layout:fragment="content">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-4">Registro de estudiante</h1>

          <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
          <div th:if="${param.success}" class="alert alert-success py-2">
            Registro exitoso. Ya puedes iniciar sesión.
          </div>

          <form th:action="@{/register}" method="post">
            <div class="row g-3">

              <div class="col-md-6">
                <label for="code" class="form-label">Código</label>
                <input type="text" id="code" name="code" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="documentType" class="form-label">Tipo de documento</label>
                <select id="documentType" name="documentType" class="form-select" required>
                  <option value="" selected disabled>Seleccione...</option>
                  <option th:each="dt : ${documentTypes}" th:value="${dt}" th:text="${dt}"></option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="firstName" class="form-label">Nombres</label>
                <input type="text" id="firstName" name="firstName" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="lastName" class="form-label">Apellidos</label>
                <input type="text" id="lastName" name="lastName" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="documentNumber" class="form-label">Número de documento</label>
                <input type="text" id="documentNumber" name="documentNumber" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="phone" class="form-label">Teléfono</label>
                <input type="text" id="phone" name="phone" class="form-control">
              </div>

              <div class="col-12">
                <label for="address" class="form-label">Dirección</label>
                <input type="text" id="address" name="address" class="form-control">
              </div>

              <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" required minlength="6">
              </div>

            </div>

            <div class="d-flex justify-content-between align-items-center mt-4">
              <a th:href="@{/login}">Ya tengo cuenta</a>
              <button type="submit" class="btn btn-primary">Registrar</button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
