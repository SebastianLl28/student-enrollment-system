# ── Base de datos ──────────────────────────────────────────────────────────────
# No borrar la BD al reiniciar (a diferencia del default create-drop en dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.pe.utp=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# ── URL pública (para PayPal return/cancel y webhooks) ─────────────────────────
app.base-url=${APP_BASE_URL}

# ── Email SMTP ─────────────────────────────────────────────────────────────────
spring.mail.host=${EMAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${EMAIL_PORT:2525}
