spring.application.name=studentLocalModel-enrollment-system
server.port=${PORT:8080}

# ── Base de datos ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://studentLocalModel-enrollment-mysql:3306/student_enrollment_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Seguridad ──────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ── Logging (dev) ──────────────────────────────────────────────────────────────
logging.level.org.springframework.web=DEBUG

# ── Email SMTP ─────────────────────────────────────────────────────────────────
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── PayPal (sandbox por defecto) ───────────────────────────────────────────────
paypal.client-id=${PAYPAL_CLIENT_ID}
paypal.client-secret=${PAYPAL_CLIENT_SECRET}
paypal.base-url=https://api.sandbox.paypal.com

# ── URL pública (para PayPal return/webhook) ───────────────────────────────────
# En dev: usar tunnel (ngrok / Cloudflare Tunnel) y sobreescribir esta variable
app.base-url=${APP_BASE_URL:http://localhost:8080}
