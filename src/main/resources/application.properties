spring.application.name=studentLocalModel-enrollment-system
server.port=${PORT:8080}
# mysql
spring.datasource.url=jdbc:mysql://studentLocalModel-enrollment-mysql:3306/student_enrollment_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

app.jwt.secret=${JWT_SECRET}

app.jwt.expiration=86400000
logging.level.org.springframework.web=DEBUG
